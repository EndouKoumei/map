<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>M4 Dashboard - Storm Tracker VN</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background: #0b1828; color: #e2e8f0; height: 100vh; overflow: hidden;
    }
    #nav {
      height: 40px; background: #0b1d30; border-bottom: 1px solid #1e3a5f;
      display: flex; align-items: center; gap: 14px; padding: 0 16px;
    }
    .nav-brand { font-weight: 700; color: #60a5fa; }
    .nav-link {
      color: #7fa8d0; text-decoration: none; font-size: 14px; font-weight: 600;
      padding: 12px 10px 10px; border-bottom: 2px solid transparent;
    }
    .nav-link.active { color: #60a5fa; border-bottom-color: #60a5fa; }
    .nav-right { margin-left: auto; font-size: 11px; color: #2d4a6e; }
    main { height: calc(100vh - 40px); overflow-y: auto; }
    .hero {
      padding: 20px 24px 14px; border-bottom: 1px solid #1e3a5f;
      background: linear-gradient(180deg, #13243a, #0f1d30);
    }
    .hero h1 { font-size: 22px; margin-bottom: 4px; }
    .hero p { color: #7fa8d0; font-size: 13px; }
    .wrap { padding: 18px 24px 28px; max-width: 1420px; margin: 0 auto; }
    .kpis { display: grid; grid-template-columns: repeat(5, minmax(150px, 1fr)); gap: 10px; margin-bottom: 16px; }
    .kpi, .panel {
      background: #102238; border: 1px solid #1e3a5f; border-radius: 8px;
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
    }
    .kpi { padding: 14px; }
    .kpi-num { font-size: 26px; font-weight: 800; color: #60a5fa; }
    .kpi-label { font-size: 12px; color: #7fa8d0; margin-top: 3px; }
    .grid { display: grid; grid-template-columns: 1.45fr 1fr; gap: 14px; align-items: start; }
    .panel { padding: 14px; min-height: 250px; }
    .panel h2 { font-size: 14px; margin-bottom: 10px; color: #dbeafe; }
    .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 14px; }
    canvas { width: 100%; max-height: 320px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { padding: 8px 6px; border-bottom: 1px solid #1e3a5f; text-align: left; }
    th { color: #7fa8d0; font-weight: 700; }
    td:last-child, th:last-child { text-align: right; }
    .note {
      margin-top: 14px; color: #7fa8d0; font-size: 12px; line-height: 1.55;
      background: #0d1e30; border: 1px solid #1e3a5f; border-radius: 8px; padding: 12px;
    }
    .loading { padding: 30px; color: #7fa8d0; }
    @media (max-width: 980px) {
      body { overflow: auto; }
      main { height: auto; }
      .kpis, .grid, .charts { grid-template-columns: 1fr; }
      .nav-right { display: none; }
    }
  </style>
</head>
<body>
  <nav id="nav">
    <span class="nav-brand">🌀 Storm Tracker VN</span>
    <a href="/" class="nav-link">📚 Lịch sử bão</a>
    <a href="/realtime" class="nav-link">📡 Thời gian thực</a>
    <a href="/dashboard" class="nav-link active">📊 Dashboard</a>
    <span class="nav-right">ĐATN 2025.2 · Đặng Hồng Minh · 20225740</span>
  </nav>
  <main>
    <section class="hero">
      <h1>Dashboard Phân tích Bão Việt Nam</h1>
      <p>M4 · Xu hướng dài hạn, mùa vụ, phân bố cấp bão và vùng ảnh hưởng từ dữ liệu IBTrACS.</p>
    </section>
    <div class="wrap" id="app"><div class="loading">Đang tải thống kê...</div></div>
  </main>

<script>
const CAT_LABELS = { TD:'Áp thấp nhiệt đới', TS:'Bão thường', STS:'Bão mạnh', TY:'Bão rất mạnh', STY:'Siêu bão' };
const CAT_COLORS = { TD:'#6EC1EA', TS:'#4DFFFF', STS:'#C0FFC0', TY:'#FF738A', STY:'#A188FC' };
const MONTHS = ['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'];
Chart.defaults.color = '#94a3b8';
Chart.defaults.borderColor = '#1e3a5f';

function fmt(n) {
  return Number(n || 0).toLocaleString('vi-VN');
}

async function loadDashboard() {
  const res = await fetch('/api/dashboard-stats');
  const data = await res.json();
  if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
  render(data);
}

function render(data) {
  const s = data.summary;
  document.getElementById('app').innerHTML = `
    <section class="kpis">
      <div class="kpi"><div class="kpi-num">${fmt(s.total_storms)}</div><div class="kpi-label">Tổng số bão</div></div>
      <div class="kpi"><div class="kpi-num">${s.year_min}–${s.year_max}</div><div class="kpi-label">Giai đoạn dữ liệu</div></div>
      <div class="kpi"><div class="kpi-num">${fmt(s.year_count)}</div><div class="kpi-label">Năm dữ liệu</div></div>
      <div class="kpi"><div class="kpi-num">${fmt(s.max_wind_kt)}</div><div class="kpi-label">Gió lớn nhất (kt)</div></div>
      <div class="kpi"><div class="kpi-num">${data.generated_at.slice(0,10)}</div><div class="kpi-label">Thời điểm tính toán</div></div>
    </section>

    <section class="grid">
      <div class="panel"><h2>Xu hướng bão theo thập kỷ</h2><canvas id="decadeChart"></canvas></div>
      <div class="panel"><h2>So sánh trước/sau năm 2000</h2><canvas id="eraChart"></canvas></div>
    </section>

    <section class="charts">
      <div class="panel"><h2>Mùa vụ theo tháng</h2><canvas id="monthChart"></canvas></div>
      <div class="panel"><h2>Phân bố cấp bão</h2><canvas id="catChart"></canvas></div>
      <div class="panel"><h2>Phân bố theo vùng ven biển Việt Nam</h2><canvas id="regionChart"></canvas></div>
      <div class="panel"><h2>Top 10 bão mạnh nhất</h2><div id="topTable"></div></div>
    </section>

    <div class="note">
      Ghi chú: vùng Bắc/Trung/Nam Bộ được ước lượng từ các điểm track đi qua vùng biển gần Việt Nam
      (8°N–24.5°N, 102°E–116.5°E). Dashboard này phục vụ phân tích định hướng và demo M4;
      nếu cần kết luận theo tỉnh đổ bộ chính xác, cần bổ sung dữ liệu ranh giới/đổ bộ chi tiết hơn.
    </div>`;

  drawDecade(data.by_decade);
  drawEra(data.era_comparison);
  drawMonth(data.by_month);
  drawCategory(data.by_category);
  drawRegion(data.by_region);
  renderTop(data.top_strongest);
}

function drawDecade(rows) {
  new Chart(document.getElementById('decadeChart'), {
    type: 'bar',
    data: {
      labels: rows.map(r => r.decade),
      datasets: [
        { label:'Số bão', data: rows.map(r => r.count), backgroundColor:'#60a5facc' },
        { label:'Siêu bão', data: rows.map(r => r.super_typhoon_count), backgroundColor:'#A188FCcc' },
      ],
    },
    options: { responsive:true, plugins:{ legend:{ position:'bottom' } }, scales:{ x:{ ticks:{ maxRotation:60 } } } },
  });
}

function drawEra(rows) {
  new Chart(document.getElementById('eraChart'), {
    type:'bar',
    data:{
      labels: rows.map(r => r.period),
      datasets:[
        { label:'Số bão', data: rows.map(r => r.count), backgroundColor:'#4DFFFFbb' },
        { label:'Tỷ lệ siêu bão (%)', data: rows.map(r => r.super_typhoon_pct), backgroundColor:'#FF738Abb', yAxisID:'y1' },
      ],
    },
    options:{ responsive:true, plugins:{ legend:{ position:'bottom' } }, scales:{ y:{ beginAtZero:true }, y1:{ beginAtZero:true, position:'right', grid:{ drawOnChartArea:false } } } },
  });
}

function drawMonth(rows) {
  new Chart(document.getElementById('monthChart'), {
    type:'line',
    data:{ labels: MONTHS, datasets:[{ label:'Số bão xuất hiện trong tháng', data: rows.map(r => r.count), borderColor:'#22c55e', backgroundColor:'#22c55e33', tension:.35, fill:true }] },
    options:{ responsive:true, plugins:{ legend:{ position:'bottom' } } },
  });
}

function drawCategory(rows) {
  new Chart(document.getElementById('catChart'), {
    type:'doughnut',
    data:{ labels: rows.map(r => CAT_LABELS[r.category] || r.category), datasets:[{ data: rows.map(r => r.count), backgroundColor: rows.map(r => CAT_COLORS[r.category] || '#64748b') }] },
    options:{ responsive:true, plugins:{ legend:{ position:'bottom' } } },
  });
}

function drawRegion(rows) {
  new Chart(document.getElementById('regionChart'), {
    type:'bar',
    data:{ labels: rows.map(r => r.region), datasets:[{ label:'Số bão', data: rows.map(r => r.count), backgroundColor:'#facc15bb' }] },
    options:{ responsive:true, indexAxis:'y', plugins:{ legend:{ display:false } } },
  });
}

function renderTop(rows) {
  document.getElementById('topTable').innerHTML = `
    <table>
      <thead><tr><th>Bão</th><th>Năm</th><th>Cấp</th><th>Gió</th></tr></thead>
      <tbody>${rows.map(r => `<tr><td>${r.name || r.sid}</td><td>${r.season}</td><td>${CAT_LABELS[r.category] || r.category}</td><td>${r.max_wind_kt} kt</td></tr>`).join('')}</tbody>
    </table>`;
}

loadDashboard().catch(err => {
  document.getElementById('app').innerHTML = `<div class="loading" style="color:#f87171">Không tải được dashboard: ${err.message}</div>`;
});
</script>
</body>
</html>
